# FSL Wayland Configuration Fragment
#
# This fragment configures the build for Wayland display backend with systemd.
# It removes X11 and DirectFB support and enables Wayland and PAM features.

BB_CONF_FRAGMENT_SUMMARY = "Enable Wayland display backend"
BB_CONF_FRAGMENT_DESCRIPTION = "Configures systemd init system and enables Wayland display backend while removing X11 and DirectFB support."

# Define Init System
INIT_MANAGER = "systemd"

# Remove conflicting backends
DISTRO_FEATURES:remove = "directfb x11"
DISTRO_FEATURES:append = " wayland pam"
