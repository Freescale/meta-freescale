# FSL XWayland Configuration Fragment
#
# This fragment configures the build for Wayland with XWayland support.
# It enables both X11 and Wayland backends with systemd.

BB_CONF_FRAGMENT_SUMMARY = "Enable Wayland with XWayland"
BB_CONF_FRAGMENT_DESCRIPTION = "Configures systemd init system and enables both X11 and Wayland display backends with XWayland support."

# Define Init System
INIT_MANAGER = "systemd"

# Remove conflicting backends
DISTRO_FEATURES:remove = "directfb"
DISTRO_FEATURES:append = " x11 wayland pam"
